<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Miriam Jorna (miriamjorna)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <!-- show available shows on load -->
    <div id="shows-view">
      <header class="center">
        <h1>TV Show Episode Guide</h1>
        <div class="search-wrap">
          <input
            type="text"
            id="show-search-input"
            placeholder="Search shows by name, genre or summary..."
            aria-label="Search shows"
          />
          <p id="show-count" class="subtitle"></p>
        </div>
      </header>

      <hr style="width: 90%" />

      <main id="shows-container"></main>

      <footer class="center">
        <p>
          TV episodes data sourced from
          <i><a href="https://www.tvmaze.com/api">TVMaze API</a></i>
        </p>
      </footer>
    </div>

    <!-- Episodes view - hidden on load -->
    <div id="episodes-view" style="display: none">
      <header class="center">
        <div class="ep-header-top">
          <button id="back-btn">← Back to Shows</button>
          <h1 id="current-show-title"></h1>
        </div>
        <div class="search-wrap">
          <select id="ep-select">
            <option value="all-episodes">Show all episodes</option>
          </select>
          <input
            type="text"
            id="search-input"
            placeholder="Search episodes..."
            aria-label="Search episodes"
          />
          <p id="ep-count" class="subtitle"></p>
        </div>
      </header>

      <hr style="width: 90%" />

      <main>
        <div class="ep-container">
          <template id="ep-card">
            <section class="ep-section">
              <img class="ep-img" alt="" />
              <h3 class="ep-title"></h3>
              <p class="ep-summary"></p>
            </section>
          </template>
        </div>
      </main>

      <footer class="center">
        <p>
          TV episodes data sourced from
          <i><a href="https://www.tvmaze.com/api">TVMaze API</a></i>
        </p>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
