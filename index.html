<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Miriam Jorna (miriamjorna)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <!-- Search-Bar -->
    <header class="search-bar">
      <select id="show-selector">
        <option value="">Select a show...</option>
      </select>

      <select id="episode-selector">
        <option value="">Select an episode...</option>
      </select>

      <input
        type="text"
        id="search-bar"
        placeholder="Search for an episode..."
      />
      <span id="search-count"></span>
    </header>

    <div id="root"></div>

    <!-- Loads a provided function called getAllEpisodes() which returns all episodes -->
    <script src="episodes.js"></script>

    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>
    <p>
      <i
        >TV episodes data sourced from
        <a href="https://www.tvmaze.com/api">TVMaze API</a>.</i
      >
    </p>
  </body>
</html>
